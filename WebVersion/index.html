<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Chat UI</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: 14px 20px;
    border-bottom: 1px solid #222;
    font-weight: bold;
    background: #121212;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .msg {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 12px;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .user {
    align-self: flex-end;
    background: #2563eb;
  }

  .bot {
    align-self: flex-start;
    background: #2a2a2a;
  }

  footer {
    display: flex;
    padding: 12px;
    border-top: 1px solid #222;
    background: #121212;
  }

  input {
    flex: 1;
    padding: 10px;
    border-radius: 10px;
    border: 1px solid #333;
    background: #1a1a1a;
    color: white;
    outline: none;
  }

  button {
    margin-left: 10px;
    padding: 10px 16px;
    border: none;
    border-radius: 10px;
    background: #2563eb;
    color: white;
    cursor: pointer;
  }

  button:hover {
    background: #1d4ed8;
  }
</style>
</head>

<body>

<header>Chat UI</header>

<div id="chat">
  <div class="msg bot">Hey! How can I help you today?</div>
</div>

<footer>
  <input id="input" placeholder="Message..." />
  <button onclick="sendMessage()">Send</button>
</footer>

<script>
  const chat = document.getElementById("chat");
  const input = document.getElementById("input");

  function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => {
      addMessage("This is a demo response.", "bot");
    }, 400);
  }

  function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "msg " + type;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>

</body>
</html>
